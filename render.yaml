services:
  # Backend Web Service
  - type: web
    name: curasync-backend
    env: node
    plan: free
    buildCommand: npm install && cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  # Frontend Static Site
  - type: web # Using web for SPA routing, or use static
    name: curasync-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishDir: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        value: https://curasync-backend.onrender.com

  # Admin Static Site
  - type: web
    name: curasync-admin
    env: static
    plan: free
    buildCommand: cd admin && npm install && npm run build
    staticPublishDir: admin/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        value: https://curasync-backend.onrender.com
